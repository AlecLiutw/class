<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">班級網頁</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky:#4AABE8;--sky-light:#E8F5FD;--sky-dark:#1A6EA8;
    --sun:#FFD43B;--sun-light:#FFF9DB;
    --coral:#FF7043;--coral-light:#FFF0EB;
    --mint:#38D9A9;--mint-light:#E6FAF5;
    --text:#2D2D2D;--text-muted:#6E6E6E;--border:#E8E8E8;
    --bg:#F8FAFF;--white:#FFFFFF;--radius:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  /* HEADER */
  header{background:linear-gradient(135deg,#4AABE8 0%,#2980C4 50%,#1A6EA8 100%);position:relative;overflow:hidden}
  .header-deco{position:absolute;inset:0;background-image:radial-gradient(circle at 10% 20%,rgba(255,255,255,0.12) 0%,transparent 40%),radial-gradient(circle at 90% 80%,rgba(255,212,59,0.18) 0%,transparent 40%)}
  .header-inner{position:relative;max-width:900px;margin:0 auto;padding:36px 24px 32px;display:flex;align-items:center;gap:20px}
  .school-badge{width:68px;height:68px;background:var(--sun);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:32px;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
  .header-school{font-size:14px;color:rgba(255,255,255,0.8);letter-spacing:0.06em;margin-bottom:4px}
  .header-class{font-size:32px;font-weight:700;color:#fff;line-height:1.1}
  .header-subtitle{font-size:14px;color:rgba(255,255,255,0.75);margin-top:6px}

  /* NAV */
  nav{background:var(--white);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
  .nav-inner{max-width:900px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none}
  .nav-inner::-webkit-scrollbar{display:none}
  nav a{padding:14px 20px;font-size:14px;font-weight:500;color:var(--text-muted);text-decoration:none;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px}
  nav a:hover{color:var(--sky)}
  nav a.active{color:var(--sky);border-bottom-color:var(--sky)}

  /* LAYOUT */
  main{max-width:900px;margin:0 auto;padding:28px 24px 60px;display:grid;grid-template-columns:1fr 340px;gap:24px}
  @media(max-width:700px){main{grid-template-columns:1fr}.header-class{font-size:24px}}

  /* COMMON */
  .section-title{font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .section-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
  .card{background:var(--white);border-radius:var(--radius);border:1.5px solid var(--border);padding:20px;margin-bottom:20px}

  /* NOTICES */
  .notice-item{padding:14px 16px;border-radius:10px;border-left:4px solid;margin-bottom:10px}
  .notice-item:last-child{margin-bottom:0}
  .notice-item.coral{background:var(--coral-light);border-color:var(--coral)}
  .notice-item.sky{background:var(--sky-light);border-color:var(--sky)}
  .notice-item.sun{background:var(--sun-light);border-color:var(--sun)}
  .notice-item.mint{background:var(--mint-light);border-color:var(--mint)}
  .notice-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-bottom:5px}
  .notice-item.coral .notice-badge{background:var(--coral);color:#fff}
  .notice-item.sky .notice-badge{background:var(--sky);color:#fff}
  .notice-item.sun .notice-badge{background:#E0A800;color:#fff}
  .notice-item.mint .notice-badge{background:var(--mint);color:#fff}
  .notice-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
  .notice-desc{font-size:13px;color:var(--text-muted);line-height:1.6}
  .notice-date{font-size:11px;color:var(--text-muted);margin-top:5px}

  /* HOMEWORK */
  .hw-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
  .hw-item:last-child{border-bottom:none;padding-bottom:0}
  .hw-subject{flex-shrink:0;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;min-width:56px;text-align:center}
  .hw-subject.math{background:#FFF0F0;color:#E53E3E}
  .hw-subject.chinese{background:#FFF5E0;color:#C05621}
  .hw-subject.english{background:#EBF8FF;color:#2B6CB0}
  .hw-subject.nature{background:#F0FFF4;color:#276749}
  .hw-subject.social{background:#FAF5FF;color:#6B46C1}
  .hw-subject.other{background:#F5F5F5;color:#555}
  .hw-text{flex:1;font-size:13px;color:var(--text);line-height:1.6}
  .hw-due{flex-shrink:0;font-size:11px;color:var(--text-muted);white-space:nowrap;margin-top:2px}

  /* TIMETABLE */
  .timetable-wrap{overflow-x:auto;border-radius:10px;border:1.5px solid var(--border)}
  table{width:100%;border-collapse:collapse;font-size:12px}
  thead th{background:var(--sky);color:#fff;padding:9px 6px;text-align:center;font-weight:700}
  thead th:first-child{background:var(--sky-dark)}
  tbody tr:nth-child(even){background:var(--sky-light)}
  td{padding:9px 6px;text-align:center;border-bottom:1px solid var(--border);color:var(--text);font-size:12px}
  td:first-child{background:var(--sky-light);font-weight:700;color:var(--sky-dark);white-space:nowrap}
  .highlight-cell{background:#FFF5E0!important;color:var(--coral);font-weight:700}

  /* TEACHER CARD */
  .teacher-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:var(--radius);padding:20px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden}
  .teacher-card::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:rgba(255,255,255,0.1);border-radius:50%}
  .teacher-avatar{width:52px;height:52px;background:rgba(255,255,255,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:10px;border:2px solid rgba(255,255,255,0.4)}
  .teacher-name{font-size:18px;font-weight:700;margin-bottom:2px}
  .teacher-role{font-size:12px;opacity:.8;margin-bottom:14px}
  .contact-row{display:flex;align-items:center;gap:8px;font-size:12px;background:rgba(255,255,255,0.15);padding:7px 10px;border-radius:8px;margin-bottom:6px}
  .contact-row:last-child{margin-bottom:0}

  /* CALENDAR */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal-day-header{text-align:center;font-size:11px;font-weight:700;color:var(--text-muted);padding:4px 0}
  .cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:6px;color:var(--text-muted)}
  .cal-day.other-month{color:var(--border)}
  .cal-day.today{background:var(--sky);color:#fff;font-weight:700}
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cal-month{font-size:14px;font-weight:700}
  .cal-nav{background:none;border:1.5px solid var(--border);border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
  .cal-nav:hover{border-color:var(--sky);color:var(--sky)}

  /* EVENTS */
  .event-row{display:flex;align-items:center;font-size:12px;padding:7px 0;border-bottom:1px dashed var(--border);gap:6px}
  .event-row:last-child{border-bottom:none}
  .event-date{min-width:36px;font-weight:700;font-size:11px;color:var(--text-muted)}
  .event-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}

  /* PHOTOS */
  .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .photo-placeholder{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:transform .2s}
  .photo-placeholder:hover{transform:scale(1.04)}
  .p1{background:linear-gradient(135deg,#4AABE8,#2980C4)}.p2{background:linear-gradient(135deg,#38D9A9,#0CA678)}.p3{background:linear-gradient(135deg,#FF7043,#E64A19)}.p4{background:linear-gradient(135deg,#9775FA,#7048E8)}.p5{background:linear-gradient(135deg,#FFD43B,#F59F00)}.p6{background:linear-gradient(135deg,#F06595,#C2255C)}

  /* ERROR / LOADING */
  .loading{text-align:center;padding:20px;color:var(--text-muted);font-size:13px}
  .loading-dot{display:inline-block;width:6px;height:6px;background:var(--sky);border-radius:50%;margin:0 2px;animation:bounce 1.2s infinite}
  .loading-dot:nth-child(2){animation-delay:.2s}.loading-dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

  .error-box{background:#FFF5F5;border:1.5px solid #FC8181;border-radius:10px;padding:16px;font-size:13px;color:#C53030;line-height:1.7}
  .error-box strong{display:block;margin-bottom:6px}

  /* NO SHEET */
  .no-sheet{max-width:500px;margin:60px auto;text-align:center;padding:40px 24px}
  .no-sheet h2{font-size:20px;font-weight:700;margin-bottom:12px;color:var(--text)}
  .no-sheet p{font-size:14px;color:var(--text-muted);line-height:1.8}
  .no-sheet code{background:var(--sky-light);color:var(--sky-dark);padding:2px 8px;border-radius:6px;font-size:13px}

  footer{text-align:center;padding:24px;font-size:12px;color:var(--text-muted);border-top:1px solid var(--border);background:var(--white)}
</style>
</head>
<body>

<header>
  <div class="header-deco"></div>
  <div class="header-inner">
    <div class="school-badge">🏫</div>
    <div class="header-text">
      <div class="header-school" id="hdr-school">載入中…</div>
      <div class="header-class" id="hdr-class">班級網頁</div>
      <div class="header-subtitle" id="hdr-subtitle">113 學年度</div>
    </div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <a href="#notices" class="active">📢 最新公告</a>
    <a href="#homework">📚 本週作業</a>
    <a href="#timetable">📅 課程表</a>
    <a href="#photos">📷 班級相片</a>
    <a href="#contact">📬 聯絡老師</a>
  </div>
</nav>

<div id="app-body">
  <main>
    <div>
      <!-- 公告 -->
      <section id="notices">
        <div class="section-title">
          <span class="section-icon" style="background:#EBF5FE">📢</span>最新公告
        </div>
        <div class="card" id="notices-content">
          <div class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>
        </div>
      </section>

      <!-- 作業 -->
      <section id="homework">
        <div class="section-title">
          <span class="section-icon" style="background:#FFF5E0">📚</span>本週作業
        </div>
        <div class="card" id="homework-content">
          <div class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>
        </div>
      </section>

      <!-- 課程表 -->
      <section id="timetable">
        <div class="section-title">
          <span class="section-icon" style="background:#E6FAF5">📅</span>每週課程表
        </div>
        <div class="card" style="padding:16px">
          <div class="timetable-wrap" id="timetable-content">
            <div class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>
          </div>
        </div>
      </section>

      <!-- 相片 -->
      <section id="photos">
        <div class="section-title">
          <span class="section-icon" style="background:#F3EEFF">📷</span>班級相片
        </div>
        <div class="card">
          <div class="photo-grid">
            <div class="photo-placeholder p1">🌊</div><div class="photo-placeholder p2">🌳</div>
            <div class="photo-placeholder p3">🎨</div><div class="photo-placeholder p4">🔭</div>
            <div class="photo-placeholder p5">🏆</div><div class="photo-placeholder p6">🎉</div>
          </div>
          <p style="font-size:12px;color:var(--text-muted);margin-top:12px;text-align:center">更多照片請見班級 Google 相簿</p>
        </div>
      </section>
    </div>

    <!-- 側邊欄 -->
    <div>
      <!-- 老師 -->
      <section id="contact">
        <div class="section-title">
          <span class="section-icon" style="background:#F3EEFF">👩‍🏫</span>聯絡老師
        </div>
        <div class="teacher-card" id="teacher-content">
          <div class="teacher-avatar">👩‍🏫</div>
          <div class="teacher-name" id="t-name">載入中…</div>
          <div class="teacher-role" id="t-role"></div>
          <div id="t-contacts"></div>
        </div>
      </section>

      <!-- 行事曆 -->
      <div class="section-title">
        <span class="section-icon" style="background:#EBF5FE">🗓</span>
        <span id="calMonthLabel"></span>
      </div>
      <div class="card" style="margin-bottom:20px">
        <div class="cal-header">
          <button class="cal-nav" onclick="prevMonth()">◀</button>
          <span class="cal-month" id="calLabel"></span>
          <button class="cal-nav" onclick="nextMonth()">▶</button>
        </div>
        <div class="cal-grid" id="calGrid">
          <div class="cal-day-header">日</div><div class="cal-day-header">一</div>
          <div class="cal-day-header">二</div><div class="cal-day-header">三</div>
          <div class="cal-day-header">四</div><div class="cal-day-header">五</div>
          <div class="cal-day-header">六</div>
        </div>
      </div>

      <!-- 活動 -->
      <div class="section-title">
        <span class="section-icon" style="background:#FFF0EB">🎯</span>近期重要活動
      </div>
      <div class="card" id="events-content">
        <div class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>
      </div>
    </div>
  </main>

  <footer>
    <p id="footer-text">© 113 學年度 班級網頁</p>
    <p style="margin-top:4px;font-size:11px;color:#aaa">Powered by Google Sheets</p>
  </footer>
</div>

<script>
const params = new URLSearchParams(location.search);
const SHEET_ID = params.get('sheet');
const dotColors = ['#FF7043','#4AABE8','#38D9A9','#9775FA','#FFD43B','#F06595'];
const subjectClass = {'國語':'chinese','數學':'math','英語':'english','自然':'nature','社會':'social'};
const typeLabel = {coral:'緊急通知',sky:'活動通知',sun:'溫馨提醒',mint:'好消息'};

// 沒有 sheet 參數 → 顯示說明
if (!SHEET_ID) {
  document.getElementById('app-body').innerHTML = `
    <div class="no-sheet">
      <div style="font-size:48px;margin-bottom:16px">🏫</div>
      <h2>班級網頁模板</h2>
      <p>請在網址後方加上 <code>?sheet=試算表ID</code><br>才能顯示班級內容。<br><br>
      範例：<br><code>index.html?sheet=你的試算表ID</code></p>
    </div>`;
  document.getElementById('hdr-school').textContent = '學校名稱';
  document.getElementById('hdr-class').textContent = '班級網頁模板';
  document.getElementById('hdr-subtitle').textContent = '請在網址加上 ?sheet=試算表ID';
} else {
  init();
}

function sheetURL(name) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
}

function parseGViz(text) {
  const json = JSON.parse(text.replace(/^[^(]+\(/,'').replace(/\);?\s*$/,''));
  const cols = json.table.cols.map(c => c.label);
  return json.table.rows
    .filter(row => row.c && row.c.some(c => c && (c.v || c.f)))
    .map(row => {
      const obj = {};
      row.c.forEach((cell, i) => { obj[cols[i]] = cell ? (cell.f || cell.v || '') : ''; });
      return obj;
    });
}

async function fetchSheet(name) {
  const res = await fetch(sheetURL(name));
  return parseGViz(await res.text());
}

function errBox(msg) {
  return `<div class="error-box"><strong>⚠️ 讀取失敗</strong>${msg}</div>`;
}

async function loadInfo() {
  try {
    const rows = await fetchSheet('基本資料');
    if (!rows.length) return;
    const r = rows[0];
    document.getElementById('hdr-school').textContent = r['學校名稱'] || '';
    document.getElementById('hdr-class').textContent = r['班級名稱'] || '班級網頁';
    document.getElementById('hdr-subtitle').textContent = (r['學年度'] || '113 學年度') + ' ｜ 班導師：' + (r['老師姓名'] || '');
    document.getElementById('page-title').textContent = (r['班級名稱'] || '班級網頁') + ' – ' + (r['學校名稱'] || '');
    document.getElementById('t-name').textContent = (r['老師姓名'] || '') + ' 老師';
    document.getElementById('t-role').textContent = (r['班級名稱'] || '') + '班導師' + (r['科任'] ? ' ｜ ' + r['科任'] : '');
    let contacts = '';
    if (r['Email']) contacts += `<div class="contact-row">📧 ${r['Email']}</div>`;
    if (r['電話']) contacts += `<div class="contact-row">📞 ${r['電話']}</div>`;
    if (r['接聽時間']) contacts += `<div class="contact-row">🕐 ${r['接聽時間']}</div>`;
    document.getElementById('t-contacts').innerHTML = contacts;
    document.getElementById('footer-text').textContent = `© ${r['學年度'] || '113 學年度'} ${r['學校名稱'] || ''} ${r['班級名稱'] || ''}`;
  } catch(e) { console.warn('基本資料讀取失敗', e); }
}

async function loadNotices() {
  const el = document.getElementById('notices-content');
  try {
    const rows = await fetchSheet('公告');
    if (!rows.length) { el.innerHTML = '<p style="font-size:13px;color:var(--text-muted);text-align:center">目前沒有公告</p>'; return; }
    el.innerHTML = rows.map(r => `
      <div class="notice-item ${r['類型']||'sky'}">
        <div class="notice-badge">${typeLabel[r['類型']]||'公告'}</div>
        <div class="notice-title">${r['標題']||''}</div>
        <div class="notice-desc">${r['內容']||''}</div>
        <div class="notice-date">${r['日期']||''}</div>
      </div>`).join('');
  } catch(e) { el.innerHTML = errBox('請確認試算表已「發布到網路」'); }
}

async function loadHomework() {
  const el = document.getElementById('homework-content');
  try {
    const rows = await fetchSheet('作業');
    if (!rows.length) { el.innerHTML = '<p style="font-size:13px;color:var(--text-muted);text-align:center">本週沒有作業 🎉</p>'; return; }
    el.innerHTML = rows.map(r => `
      <div class="hw-item">
        <span class="hw-subject ${subjectClass[r['科目']]||'other'}">${r['科目']||''}</span>
        <div class="hw-text">${r['內容']||''}</div>
        <span class="hw-due">${r['截止']||''}</span>
      </div>`).join('');
  } catch(e) { el.innerHTML = errBox('請確認試算表已「發布到網路」'); }
}

async function loadTimetable() {
  const el = document.getElementById('timetable-content');
  try {
    const rows = await fetchSheet('課程表');
    if (!rows.length) { el.innerHTML = '<p style="font-size:13px;color:var(--text-muted);text-align:center;padding:12px">尚未填寫課程表</p>'; return; }
    const days = ['週一','週二','週三','週四','週五'];
    let html = `<table><thead><tr><th>節次</th>${days.map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody>`;
    rows.forEach(r => {
      html += `<tr><td>${r['節次']||''}</td>`;
      days.forEach(d => { html += `<td>${r[d]||'—'}</td>`; });
      html += '</tr>';
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  } catch(e) { el.innerHTML = errBox('課程表讀取失敗'); }
}

async function loadEvents() {
  const el = document.getElementById('events-content');
  try {
    const rows = await fetchSheet('活動');
    if (!rows.length) { el.innerHTML = '<p style="font-size:13px;color:var(--text-muted);text-align:center">目前沒有活動</p>'; return; }
    el.innerHTML = rows.map((r, i) => `
      <div class="event-row">
        <span class="event-date">${r['日期']||''}</span>
        <span class="event-dot" style="background:${dotColors[i%dotColors.length]}"></span>
        <span style="font-size:13px">${r['活動名稱']||''}</span>
      </div>`).join('');
  } catch(e) { el.innerHTML = errBox('活動讀取失敗'); }
}

// 行事曆
let cy = new Date().getFullYear(), cm = new Date().getMonth();
const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
function buildCalendar(y, m) {
  document.getElementById('calLabel').textContent = `${y} 年 ${months[m]}`;
  document.getElementById('calMonthLabel').textContent = `${months[m]} 行事曆`;
  const grid = document.getElementById('calGrid');
  const headers = Array.from(grid.querySelectorAll('.cal-day-header'));
  grid.innerHTML = '';
  headers.forEach(h => grid.appendChild(h));
  const today = new Date();
  const firstDay = new Date(y, m, 1).getDay();
  const dim = new Date(y, m+1, 0).getDate();
  const prev = new Date(y, m, 0).getDate();
  for (let i = 0; i < firstDay; i++) { const d = document.createElement('div'); d.className='cal-day other-month'; d.textContent=prev-firstDay+1+i; grid.appendChild(d); }
  for (let d = 1; d <= dim; d++) { const el = document.createElement('div'); el.className='cal-day'; el.textContent=d; if (today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d) el.classList.add('today'); grid.appendChild(el); }
  const rem = (7-(firstDay+dim)%7)%7;
  for (let d=1;d<=rem;d++){const el=document.createElement('div');el.className='cal-day other-month';el.textContent=d;grid.appendChild(el);}
}
function prevMonth(){cm--;if(cm<0){cm=11;cy--;}buildCalendar(cy,cm);}
function nextMonth(){cm++;if(cm>11){cm=0;cy++;}buildCalendar(cy,cm);}

async function init() {
  buildCalendar(cy, cm);
  await loadInfo();
  loadNotices();
  loadHomework();
  loadTimetable();
  loadEvents();
}

document.querySelectorAll('nav a').forEach(a => {
  a.addEventListener('click', function() {
    document.querySelectorAll('nav a').forEach(x => x.classList.remove('active'));
    this.classList.add('active');
  });
});
</script>
